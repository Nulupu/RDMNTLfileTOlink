services:
  - type: web
    name: telegram-mp3-bot
    env: python
    region: frankfurt  # or oregon, singapore, etc.
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_streamer.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: WEBHOOK_URL
        sync: false
    plan: free

services:
  - type: web
    name: telegram-mp3-bot
    env: python
    region: frankfurt  # or oregon, singapore, etc.
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:10000 bot_streamer:app
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: WEBHOOK_URL
        sync: false
    plan: free

services:
  - type: web
    name: telegram-mp3-streamer
    env: python
    region: oregon  # or choose your preferred region
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_streamer.py
    envVars:
      - key: BOT_TOKEN
        value: your_bot_token_here
      - key: API_ID
        value: your_api_id_here
      - key: API_HASH
        value: your_api_hash_here
      - key: WEBHOOK_URL
        value: https://your-service-name.onrender.com
